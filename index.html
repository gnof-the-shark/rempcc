<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCC REM Montréal - Superviseur Réseau & Cockpit</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Courier New', Courier, monospace;
            background-color: #060911; color: #00ff66;
        }
        
        #main-container { display: flex; flex-direction: column; width: 100%; height: 100%; }

        #header {
            height: 40px; background: #0c1322; border-bottom: 2px solid #00ff66;
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        #pcc-title { font-weight: bold; font-size: 14px; letter-spacing: 2px; }

        /* Écran divisé : Gauche Synoptique / Droite Vidéo & Manuel */
        #workspace { flex: 1; display: flex; overflow: hidden; }
        
        #simulation-zone { flex: 2; position: relative; background: #080d16; border-right: 1px solid #1a2942; }
        canvas { width: 100%; height: 100%; display: block; }

        #side-panels { flex: 1; display: flex; flex-direction: column; background: #090f1a; min-width: 400px; }
        
        /* Module Écran de Vidéosurveillance / Cockpit */
        #cctv-screen {
            height: 250px; background: #000; border-bottom: 2px solid #1a2942;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; color: #00ff66;
        }
        #cctv-canvas { width: 100%; height: 100%; position: absolute; top:0; left:0; pointer-events: none; }
        #cctv-overlay { position: absolute; top: 10px; left: 10px; font-size: 11px; font-weight: bold; z-index: 2; text-shadow: 1px 1px #000; }
        #manual-hud { position: absolute; bottom: 10px; width: 90%; display: flex; justify-content: space-between; font-weight: bold; background: rgba(0,0,0,0.7); padding: 5px; box-sizing: border-box; }

        /* Commandes & Logs */
        #pcc-dashboard { flex: 1; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; gap: 15px; }
        #controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        select, button {
            background: #121b2d; color: #00ff66; border: 1px solid #00ff66;
            padding: 8px; font-family: inherit; font-size: 12px; font-weight: bold;
            cursor: pointer; border-radius: 4px; width: 100%;
        }
        button:hover { background: #00ff66; color: #060911; }
        .btn-alert { border-color: #ff3333; color: #ff3333; }
        .btn-alert:hover { background: #ff3333; color: #fff; }
        .btn-active { background: #00ff66 !important; color: #060911 !important; }

        #log-container {
            flex: 1; background: #04070c; border: 1px solid #1a2942;
            border-radius: 4px; padding: 10px; font-size: 11px; overflow-y: auto; color: #88a0c0;
        }
        .log-entry { margin-bottom: 4px; }
        .log-time { color: #00ff66; margin-right: 8px; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="header">
        <div id="pcc-title">🔴 PCC REM METROPOLE - SURVEILLANCE & PILOTAGE DIRECT</div>
        <div id="pcc-status" id="modeStatut">MODE: AUTOMATIQUE (ATC)</div>
    </div>

    <div id="workspace">
        <div id="simulation-zone">
            <canvas id="synoptiqueCanvas"></canvas>
        </div>

        <div id="side-panels">
            <div id="cctv-screen">
                <div id="cctv-overlay">CCTV_FEED: AUCUN CANAL</div>
                <canvas id="cctvCanvas"></canvas>
                <div id="manual-hud" style="display: none;">
                    <span id="hud-vitesse">VIT: 0 KM/H</span>
                    <span id="hud-statut">PROPULSION IDLE</span>
                </div>
            </div>

            <div id="pcc-dashboard">
                <div id="controls">
                    <div style="grid-column: span 2;">
                        <label for="rame-select">SÉLECTION UNITÉ TRACE :</label>
                        <select id="rame-select" onchange="changerSelectionRame()"></select>
                    </div>
                    <button class="control-btn btn-alert" onclick="arretUrgence()">ARRÊT D'URGENCE</button>
                    <button id="btn-manual" class="control-btn" onclick="basculerModeManuel()">MODE MANUEL (VUE)</button>
                    <button class="control-btn" onclick="modeMeteo()">MODE TEMPÊTE</button>
                    <button class="control-btn" onclick="relancerRame()">RÉARMER LA RAME</button>
                </div>
                <div style="font-size: 11px; color:#88a0c0; text-align:center;">
                    💡 Cliquez sur une station pour ouvrir sa caméra et injecter des voyageurs (+ Renforts).
                </div>
                <div id="log-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('synoptiqueCanvas');
    const ctx = canvas.getContext('2d');
    const cctvCanvas = document.getElementById('cctvCanvas');
    const cctvCtx = cctvCanvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        cctvCanvas.width = cctvCanvas.parentElement.clientWidth;
        cctvCanvas.height = cctvCanvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    // --- CARTOGRAPHIE SYNOPTIQUE DU RÉSEAU ---
    const lignesGraphiques = {
        "A1": [
            { id: "A1_GCE", name: "Gare Centrale", x: 150, y: 250, passagers: 10 },
            { id: "A1_IDS", name: "Île-des-Sœurs", x: 350, y: 250, passagers: 5 },
            { id: "A1_DQU", name: "Du Quartier", x: 650, y: 150, passagers: 8 },
            { id: "A1_BRO", name: "Brossard", x: 900, y: 150, passagers: 12 }
        ],
        "A2": [
            { id: "A2_GCE", name: "Gare Centrale", x: 150, y: 250, passagers: 10 },
            { id: "A2_EMP", name: "Édouard-Montpetit", x: 350, y: 350, passagers: 25 },
            { id: "A2_DSC", name: "Des Sources", x: 650, y: 450, passagers: 4 },
            { id: "A2_YUL", name: "YUL-Aéroport", x: 900, y: 450, passagers: 30 }
        ],
        "A3": [
            { id: "A3_GCE", name: "Gare Centrale", x: 150, y: 250, passagers: 10 },
            { id: "A3_SBY", name: "Sunnybrooke", x: 350, y: 200, passagers: 7 },
            { id: "A3_KKL", name: "Kirkland", x: 650, y: 80, passagers: 3 },
            { id: "A3_AAO", name: "Anse-à-l'Orme", x: 900, y: 80, passagers: 15 }
        ],
        "A4": [
            { id: "A4_GCE", name: "Gare Centrale", x: 150, y: 250, passagers: 10 },
            { id: "A4_CNR", name: "Canora", x: 350, y: 300, passagers: 14 },
            { id: "A4_DRS", name: "Du Ruisseau", x: 650, y: 380, passagers: 9 },
            { id: "A4_DMG", name: "Deux-Montagnes", x: 900, y: 380, passagers: 22 }
        ]
    };

    // --- EXPANSION DE LA FLOTTE : 12 TRAINS SIMULTANÉS ---
    let rames = [];
    const antennes = ["A1", "A2", "A3", "A4"];
    antennes.forEach(ant => {
        for(let i = 1; i <= 3; i++) {
            rames.push({
                id: `REM-${ant}-${100 + i * 24}`,
                ligne: ant,
                etape: i - 1, // Dispatch décalé le long des voies au départ
                prog: Math.random() * 0.7,
                sens: 1,
                vitesse: 0.003 + Math.random() * 0.002,
                maxVit: 0.005,
                enStation: false,
                timerArret: 0,
                urg: false,
                renfort: false
            });
        }
    });

    // Sélection d'affichage par défaut
    let rameSelectionnee = rames[0];
    let stationSelectionnee = lignesGraphiques["A1"][0];
    let modeManuelActif = false;
    let vitesseManuelle = 0;

    // Peupler le sélecteur
    const select = document.getElementById('rame-select');
    rames.forEach(r => {
        let opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = `${r.id} [Antenne ${r.ligne}]`;
        select.appendChild(opt);
    });

    // Événement clic sur le canvas synoptique (Détection des Stations)
    canvas.addEventListener('click', function(e) {
        const rect = canvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;
        const scaleX = canvas.width / 1100;
        const scaleY = canvas.height / 600;

        Object.keys(lignesGraphiques).forEach(key => {
            lignesGraphiques[key].forEach(st => {
                let stX = st.x * scaleX;
                let stY = st.y * scaleY;
                let dist = Math.sqrt((clickX - stX)**2 + (clickY - stY)**2);
                
                if (dist < 15) {
                    stationSelectionnee = st;
                    modeManuelActif = false;
                    document.getElementById('manual-hud').style.display = "none";
                    
                    // Injection de foule
                    st.passagers += Math.floor(Math.random() * 40 + 20);
                    ajouterLog(`📢 INFLUX : Affluence critique à la station ${st.name} (${st.passagers} voyageurs).`);
                    
                    // Ordre de déploiement d'une rame de renfort depuis la Gare Centrale
                    declencherRenfortGareCentrale(key, st.name);
                }
            });
        });
    });

    function declencherRenfortGareCentrale(antenneCode, nomStation) {
        // Recherche d'un train dispo à la Gare Centrale (étape 0) pour conversion en direct
        let rameRenfort = rames.find(r => r.ligne === antenneCode && r.etape === 0 && !r.renfort);
        if(rameRenfort) {
            rameRenfort.renfort = true;
            rameRenfort.vitesse = rameRenfort.maxVit * 1.3; // Vitesse rapide d'interception
            ajouterLog(`🚀 PCC TRACE : ${rameRenfort.id} basculé en MISSION EXPRESS vers ${nomStation}.`);
        }
    }

    function changerSelectionRame() {
        rameSelectionnee = rames.find(r => r.id === select.value);
        if(modeManuelActif) vitesseManuelle = 0;
    }

    function basculerModeManuel() {
        modeManuelActif = !modeManuelActif;
        const btn = document.getElementById('btn-manual');
        const hud = document.getElementById('manual-hud');
        if(modeManuelActif) {
            btn.classList.add('btn-active');
            hud.style.display = "flex";
            vitesseManuelle = 0;
            rameSelectionnee.urg = false;
            stationSelectionnee = null;
            ajouterLog(`🕹️ PILOTAGE : ${rameSelectionnee.id} basculé en conduite manuelle.`);
        } else {
            btn.classList.remove('btn-active');
            hud.style.display = "none";
            ajouterLog(`✅ PCC : Restitution du pilotage automatique (ATC) pour ${rameSelectionnee.id}.`);
        }
    }

    // Capture des commandes clavier pour le mode manuel
    window.addEventListener('keydown', function(e) {
        if(!modeManuelActif) return;
        if(e.key === "ArrowUp" || e.key.toLowerCase() === "d") {
            vitesseManuelle = Math.min(vitesseManuelle + 5, 100); // Accélérer
        }
        if(e.key === "ArrowDown" || e.key.toLowerCase() === "s") {
            vitesseManuelle = Math.max(vitesseManuelle - 8, 0); // Freiner
        }
    });

    // --- COEUR DE LOGIQUE ET SIMULATION (60 Ticks/Sec) ---
    function bouclePrincipale() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const scaleX = canvas.width / 1100;
        const scaleY = canvas.height / 600;

        // 1. Rendu graphique du synoptique ferroviaire
        Object.keys(lignesGraphiques).forEach(key => {
            const stations = lignesGraphiques[key];
            ctx.beginPath();
            ctx.strokeStyle = "#121b2d"; ctx.lineWidth = 4;
            for(let i=0; i<stations.length; i++) {
                if(i===0) ctx.moveTo(stations[i].x * scaleX, stations[i].y * scaleY);
                else ctx.lineTo(stations[i].x * scaleX, stations[i].y * scaleY);
            }
            ctx.stroke();

            // Rendu des nœuds stations
            stations.forEach(st => {
                ctx.beginPath();
                ctx.arc(st.x * scaleX, st.y * scaleY, 7, 0, 2 * Math.PI);
                ctx.fillStyle = (stationSelectionnee === st) ? "#00ff66" : "#0c1322";
                ctx.fill();
                ctx.strokeStyle = st.passagers > 40 ? "#ff3333" : "#00ff66";
                ctx.lineWidth = 2; ctx.stroke();

                ctx.fillStyle = "#88a0c0"; ctx.font = "10px Courier New";
                ctx.fillText(`${st.name} (${st.passagers}p)`, (st.x * scaleX) - 30, (st.y * scaleY) - 15);
            });
        });

        // 2. Traitement des déplacements de la flotte
        rames.forEach(r => {
            const stations = lignesGraphiques[r.ligne];

            if(modeManuelActif && r === rameSelectionnee) {
                // Logique spécifique mode manuel
                r.prog += (vitesseManuelle / 20000);
                document.getElementById('hud-vitesse').textContent = `VIT: ${vitesseManuelle} KM/H`;
                document.getElementById('hud-statut').textContent = vitesseManuelle > 0 ? "TRACTION EN COURS" : "FREINAGE/STATIQUE";
                
                if (r.prog >= 1.0) {
                    r.prog = 0; r.etape += r.sens;
                    if (r.etape >= stations.length - 1 || r.etape <= 0) r.sens *= -1;
                    vitesseManuelle = 0; // Arrêt forcé au nœud d'étape pour validation
                    ajouterLog(`🕹️ ${r.id} : Point de jalon passé avec succès.`);
                }
            } else {
                // Logique Automatique (ATC)
                if (!r.urg && !r.enStation) {
                    r.prog += r.vitesse;
                    if (r.prog >= 1.0) {
                        r.prog = 0; r.etape += r.sens;

                        if (r.etape >= stations.length - 1 || r.etape <= 0) {
                            r.sens *= -1;
                            r.renfort = false; // Fin de mission de renfort au terminus
                            r.vitesse = r.maxVit;
                        }
                        r.enStation = true;
                    }
                } else if (r.enStation) {
                    r.timerArret += 0.016;
                    if (r.timerArret >= 2.5) {
                        r.enStation = false; r.timerArret = 0;
                        // Le train embarque les passagers
                        let stActuelle = stations[r.etape];
                        if(stActuelle) {
                            let embarques = Math.min(stActuelle.passagers, 30);
                            stActuelle.passagers -= embarques;
                        }
                    }
                }
            }

            // Dessin géométrique de la rame
            let ptA = stations[r.etape];
            let ptB = stations[r.etape + (r.sens > 0 ? 1 : -1)];
            
            if (ptA && ptB) {
                let currX = (ptA.x + (ptB.x - ptA.x) * r.prog) * scaleX;
                let currY = (ptA.y + (ptB.y - ptA.y) * r.prog) * scaleY;

                ctx.beginPath();
                ctx.arc(currX, currY, r === rameSelectionnee ? 8 : 5, 0, 2 * Math.PI);
                
                if (r.urg) ctx.fillStyle = (Math.floor(Date.now() / 200) % 2 === 0) ? "#ff3333" : "#060911";
                else if (r.renfort) ctx.fillStyle = "#ffff00"; // Jaune = Train express de renfort
                else ctx.fillStyle = r.enStation ? "#ffffff" : "#00ff66";
                
                ctx.fill();
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.stroke();

                ctx.fillStyle = "#fff"; ctx.font = "9px Courier New";
                ctx.fillText(r.id, currX - 20, currY + 16);
            }
        });

        renderÉcranSecondaire();
        requestAnimationFrame(bouclePrincipale);
    }

    // --- RENDU FLUIDE DU COCKPIT OU DE LA VIDEO DE STATION (CCTV) ---
    function renderÉcranSecondaire() {
        cctvCtx.clearRect(0, 0, cctvCanvas.width, cctvCanvas.height);
        
        // Effet radar/balayage TV rétro
        cctvCtx.fillStyle = "rgba(0, 15, 5, 0.95)";
        cctvCtx.fillRect(0, 0, cctvCanvas.width, cctvCanvas.height);

        if (modeManuelActif && rameSelectionnee) {
            document.getElementById('cctv-overlay').textContent = `LIVE_COCKPIT // UNIT: ${rameSelectionnee.id}`;
            
            // Dessin d'un pare-brise de train futuriste en lignes vectorielles
            cctvCtx.strokeStyle = "#00ff66"; cctvCtx.lineWidth = 2;
            cctvCtx.beginPath();
            cctvCtx.moveTo(20, 20); cctvCtx.lineTo(cctvCanvas.width - 20, 20);
            cctvCtx.lineTo(cctvCanvas.width - 50, cctvCanvas.height - 40);
            cctvCtx.lineTo(50, cctvCanvas.height - 40); cctvCtx.closePath();
            cctvCtx.stroke();

            // Lignes de rails fuyantes (effet de vitesse)
            let décalage = (Date.now() / 5) % 100;
            cctvCtx.beginPath();
            cctvCtx.moveTo(cctvCanvas.width / 2 - 10, 40); cctvCtx.lineTo(100, cctvCanvas.height - 40);
            cctvCtx.moveTo(cctvCanvas.width / 2 + 10, 40); cctvCtx.lineTo(cctvCanvas.width - 100, cctvCanvas.height - 40);
            cctvCtx.stroke();

            cctvCtx.fillStyle = "#00ff66"; cctvCtx.font = "12px Courier New";
            cctvCtx.fillText("▲ MAINTENIR [D] OU [HAUT] POUR PROPULSION", 40, cctvCanvas.height - 60);
            
        } else if (stationSelectionnee) {
            document.getElementById('cctv-overlay').textContent = `CAM_SURVEILLANCE // STATION: ${stationSelectionnee.name.toUpperCase()}`;
            
            // Simulation de la caméra de quai avec les passagers dessinés par petits blocs
            cctvCtx.strokeStyle = "#00ff66"; cctvCtx.lineWidth = 1;
            cctvCtx.strokeRect(30, 50, cctvCanvas.width - 60, 140);
            
            // Dessiner de petits carrés représentant les voyageurs à quai
            cctvCtx.fillStyle = "rgba(0, 255, 102, 0.4)";
            let affichagePassagers = Math.min(stationSelectionnee.passagers, 120);
            for(let i=0; i < affichagePassagers; i++) {
                let px = 40 + (i * 7) % (cctvCanvas.width - 80);
                let py = 100 + Math.floor(i / 30) * 12;
                cctvCtx.fillRect(px, py, 4, 6);
            }

            cctvCtx.fillStyle = "#fff"; cctvCtx.font = "12px Courier New";
            cctvCtx.fillText(`AFFLUENCE QUAI : ${stationSelectionnee.passagers} VOYAGEURS`, 40, 75);
        }

        // Balayage ligne CRT entrelacée
        cctvCtx.fillStyle = "rgba(0, 0, 0, 0.15)";
        for (let y = 0; y < cctvCanvas.height; y += 4) {
            cctvCtx.fillRect(0, y, cctvCanvas.width, 1);
        }
    }

    // --- INTERRUPTEURS DU TABLEAU DE BORD ---
    function ajouterLog(texte) {
        const container = document.getElementById('log-container');
        const temps = new Date().toLocaleTimeString();
        container.innerHTML += `<div class="log-entry"><span class="log-time">[${temps}]</span>${texte}</div>`;
        container.scrollTop = container.scrollHeight;
    }

    function arretUrgence() {
        if(rameSelectionnee) {
            rameSelectionnee.urg = true;
            vitesseManuelle = 0;
            ajouterLog(`🚨 ALERT_PCC : Section coupée. Arrêt d'urgence appliqué sur ${rameSelectionnee.id}.`);
        }
    }

    function modeMeteo() {
        rames.forEach(r => { r.vitesse = r.maxVit * 0.4; });
        ajouterLog(`❄️ CONFIG : Alerte Givre/Tempête. Vitesse maximale du réseau verrouillée à 40%.`);
    }

    function relancerRame() {
        if(rameSelectionnee) {
            rameSelectionnee.urg = false;
            rameSelectionnee.enStation = false;
            rameSelectionnee.vitesse = rameSelectionnee.maxVit;
            ajouterLog(`✅ PCC : Réarmement des automatismes (ATC) pour ${rameSelectionnee.id}.`);
        }
    }

    // Amorçage du système global
    resizeCanvas();
    ajouterLog("Poste de contrôle en ligne. Liaison synoptique 12 rames connectée.");
    requestAnimationFrame(bouclePrincipale);
</script>

</body>
</html>
