<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REM Montréal - Simulateur Multi-Trains OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Inter', sans-serif; }
        .scada-panel { background: #0f1115; border-right: 2px solid #1f2937; }
        .led { width: 10px; height: 10px; border-radius: 50%; transition: all 0.2s; }
        .led-green { background-color: #22c55e; box-shadow: 0 0 12px #22c55e; }
        .led-yellow { background-color: #eab308; box-shadow: 0 0 12px #eab308; }
        .led-red { background-color: #ef4444; box-shadow: 0 0 12px #ef4444; }
        .led-off { background-color: #374151; }
        .blink { animation: blinker 0.8s step-start infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen w-screen text-gray-300">

    <!-- SCADA INTERFACE GAUCHE -->
    <div class="scada-panel w-[350px] flex flex-col z-10 shadow-2xl">
        <!-- Header -->
        <div class="p-4 bg-black/40 border-b border-white/5">
            <div class="flex items-center justify-between mb-1">
                <h1 class="text-xl font-black text-white tracking-tighter">REM <span class="text-green-500">OCC</span></h1>
                <span class="text-[10px] bg-red-600 px-2 py-0.5 rounded text-white animate-pulse">LIVE</span>
            </div>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Opérations Centre de Contrôle</p>
        </div>

        <!-- Statut du Train Sélectionné -->
        <div class="p-4 space-y-4 overflow-y-auto flex-grow">
            <div class="bg-white/5 rounded-lg p-3 border border-white/10">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs font-bold text-blue-400">TRAIN MR-01 (LEADER)</span>
                    <div id="led-atc" class="led led-green"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-2 mb-4 text-center text-[10px]">
                    <div class="bg-black/40 p-2 rounded">
                        <div class="text-gray-500 mb-1">VITESSE</div>
                        <div class="text-lg font-mono text-green-400"><span id="val-speed">0</span> <span class="text-[10px]">km/h</span></div>
                    </div>
                    <div class="bg-black/40 p-2 rounded">
                        <div class="text-gray-500 mb-1">MODE</div>
                        <div id="val-mode" class="text-lg font-mono text-yellow-500">AUTO</div>
                    </div>
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between text-[10px] uppercase text-gray-500">
                        <span>Traction</span>
                        <span id="txt-emergency" class="text-red-500 hidden font-bold">URGENCE ACTIVÉE</span>
                    </div>
                    <div class="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
                        <div id="bar-speed" class="bg-green-500 h-full transition-all" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Portes -->
            <div class="bg-white/5 rounded-lg p-3 border border-white/10">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-bold uppercase">Portes Train / Quai</span>
                    <div id="led-doors" class="led led-off"></div>
                </div>
                <button id="btn-doors" class="w-full py-2 bg-orange-600 hover:bg-orange-500 disabled:opacity-20 disabled:cursor-not-allowed text-white text-xs font-bold rounded transition-all uppercase">
                    Ouverture Manuelle [O]
                </button>
            </div>

            <!-- Carte de Ligne Dynamique -->
            <div>
                <h2 class="text-[10px] font-bold text-gray-500 mb-3 uppercase tracking-widest border-b border-gray-800 pb-1">Synoptique de Ligne</h2>
                <div id="station-list" class="space-y-1 relative pl-4 border-l-2 border-gray-800 ml-2 py-2 text-[11px]">
                    <!-- Stations injectées ici -->
                </div>
            </div>
        </div>

        <!-- Footer Commandes -->
        <div class="p-4 bg-black/60 text-[10px] border-t border-white/5">
            <div class="grid grid-cols-2 gap-2">
                <span class="text-gray-600 font-mono">Z/S : ACCEL/FREIN</span>
                <span class="text-gray-600 font-mono">M : AUTO/MANU</span>
                <span class="text-gray-600 font-mono">C : CAMÉRA</span>
                <span class="text-gray-600 font-mono">ESP : URGENCE</span>
            </div>
        </div>
    </div>

    <!-- RENDU 3D -->
    <div class="flex-grow relative">
        <div id="container" class="w-full h-full"></div>
        <div id="camera-label" class="absolute top-6 right-6 bg-black/80 px-4 py-2 border border-white/10 text-[10px] font-mono rounded-full uppercase tracking-tighter shadow-2xl">
            Vue : Poursuite
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- DONNÉES RÉSEAU ---
        const STATIONS = [
            { name: "Brossard", pos: 0 },
            { name: "Du Quartier", pos: 1200 },
            { name: "Panama", pos: 3200 },
            { name: "Île-des-Sœurs", pos: 7500 },
            { name: "Gare Centrale", pos: 10500 },
            { name: "McGill", pos: 11200 },
            { name: "Édouard-Montpetit", pos: 13000 },
            { name: "Canora", pos: 15500 },
            { name: "Ville-de-Montréal", pos: 16800 },
            { name: "Côte-de-Liesse", pos: 18500 },
            { name: "Montpellier", pos: 20000 },
            { name: "Du Ruisseau", pos: 21500 },
            { name: "Bois-Franc", pos: 23500 }
        ];
        const TOTAL_TRACK_LENGTH = 25000;

        // --- CONFIGURATION SIMULATION ---
        const config = {
            numTrains: 6,
            safetyDistance: 400,
            maxSpeed: 100 / 3.6, // m/s
            accel: 0.5,
            decel: 0.8
        };

        const trains = [];
        let leaderTrain = null;
        let camMode = 0; // 0: Follow, 1: Cockpit, 2: CCTV

        // --- SCÈNE THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020305);
        scene.fog = new THREE.Fog(0x020305, 50, 400);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        // --- MATÉRIAUX ---
        const matConcrete = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
        const matNeonGreen = new THREE.MeshStandardMaterial({ color: 0x00ff44, emissive: 0x00ff44, emissiveIntensity: 2 });
        const matGlass = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.2 });

        // --- CONSTRUCTION MONDE ---
        
        // Rails (Single long mesh for performance)
        const railGeo = new THREE.BoxGeometry(0.2, 0.15, TOTAL_TRACK_LENGTH);
        const railMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 1, roughness: 0.3 });
        
        const trackGroup = new THREE.Group();
        [-0.7, 0.7].forEach(x => {
            const r = new THREE.Mesh(railGeo, railMat);
            r.position.set(x, 0.1, TOTAL_TRACK_LENGTH/2);
            trackGroup.add(r);
        });
        
        // Viaduc
        const viaduc = new THREE.Mesh(new THREE.BoxGeometry(10, 1, TOTAL_TRACK_LENGTH), matConcrete);
        viaduc.position.set(0, -0.5, TOTAL_TRACK_LENGTH/2);
        trackGroup.add(viaduc);
        scene.add(trackGroup);

        // Stations 3D + UI
        const stationNodes = [];
        STATIONS.forEach((st, i) => {
            // Mesh
            const group = new THREE.Group();
            group.position.set(0, 0, st.pos);
            
            const quai = new THREE.Mesh(new THREE.BoxGeometry(14, 0.5, 120), matConcrete);
            quai.position.y = 0.25;
            group.add(quai);

            const structure = new THREE.Mesh(new THREE.BoxGeometry(15, 8, 120), matGlass);
            structure.position.y = 4;
            group.add(structure);

            const neon = new THREE.Mesh(new THREE.BoxGeometry(15.1, 0.2, 120.1), matNeonGreen);
            neon.position.y = 8;
            group.add(neon);

            // Voyageurs
            for(let j=0; j<20; j++) {
                const person = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 1.7), new THREE.MeshStandardMaterial({color: Math.random()*0xffffff}));
                person.position.set((Math.random()-0.5)*10, 1.2, (Math.random()-0.5)*100);
                group.add(person);
            }

            scene.add(group);

            // UI SCADA
            const el = document.createElement('div');
            el.className = "flex items-center gap-2 py-1 transition-all duration-500 opacity-40";
            el.id = `st-${i}`;
            el.innerHTML = `<div class="w-2 h-2 rounded-full bg-gray-600"></div><span class="truncate">${st.name}</span>`;
            document.getElementById('station-list').appendChild(el);
            stationNodes.push(el);
        });

        // --- CLASSE TRAIN ---
        class REMTrain {
            constructor(id, startPos, isLeader = false) {
                this.id = id;
                this.pos = startPos;
                this.speed = 0;
                this.mode = 'AUTO';
                this.isLeader = isLeader;
                this.doorsOpen = false;
                this.doorTimer = 0;
                this.emergency = false;
                this.currentStation = 0;
                
                // Group 3D
                this.mesh = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(2.8, 3.2, 40), new THREE.MeshStandardMaterial({color: 0xdddddd}));
                body.position.y = 2;
                this.mesh.add(body);

                const stripe = new THREE.Mesh(new THREE.BoxGeometry(2.82, 0.4, 40), matNeonGreen);
                stripe.position.y = 1.3;
                this.mesh.add(stripe);

                // Phares
                const light = new THREE.SpotLight(0xffffaa, 10, 150, 0.5, 0.5);
                light.position.set(0, 1.5, 20);
                light.target.position.set(0, 1, 100);
                this.mesh.add(light);
                this.mesh.add(light.target);

                scene.add(this.mesh);
            }

            update(delta, nextTrainPos) {
                if (this.emergency) {
                    this.speed = Math.max(0, this.speed - config.decel * 4);
                } else if (this.doorsOpen) {
                    this.speed = 0;
                    this.doorTimer -= delta;
                    if (this.doorTimer <= 0) this.doorsOpen = false;
                } else {
                    // Calcul distance sécurité
                    let distToNext = (nextTrainPos - this.pos + TOTAL_TRACK_LENGTH) % TOTAL_TRACK_LENGTH;
                    
                    if (this.isLeader && this.mode === 'MANUAL') {
                        this.handleManualDrive();
                    } else {
                        this.handleAutoDrive(distToNext);
                    }
                }

                this.pos = (this.pos + this.speed) % TOTAL_TRACK_LENGTH;
                this.mesh.position.z = this.pos;
            }

            handleAutoDrive(distToNext) {
                const targetStation = STATIONS[this.currentStation];
                let distToStation = targetStation.pos - this.pos;
                
                // Si la station est derrière, elle est sur le prochain tour (simple loop)
                if (distToStation < -100) {
                    this.currentStation = (this.currentStation + 1) % STATIONS.length;
                    return;
                }

                // Logique de freinage station vs sécurité train
                let targetSpeed = config.maxSpeed;

                if (distToStation < 300) {
                    targetSpeed = Math.max(0, (distToStation / 300) * config.maxSpeed);
                    if (distToStation < 2 && this.speed < 0.5) {
                        this.speed = 0;
                        if (!this.doorsOpen) {
                            this.doorsOpen = true;
                            this.doorTimer = 6;
                        }
                    }
                }

                // Évitement collision
                if (distToNext < config.safetyDistance) {
                    targetSpeed = Math.min(targetSpeed, (distToNext / config.safetyDistance) * config.maxSpeed);
                }

                if (this.speed < targetSpeed) this.speed += config.accel * 0.1;
                else this.speed -= config.decel * 0.1;
            }

            handleManualDrive() {
                if (keys['KeyW'] || keys['KeyZ']) this.speed = Math.min(config.maxSpeed, this.speed + 0.05);
                else if (keys['KeyS']) this.speed = Math.max(0, this.speed - 0.1);
                else this.speed = Math.max(0, this.speed - 0.01);
