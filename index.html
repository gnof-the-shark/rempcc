<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCC REM Montréal - Réseau Intégral</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Courier New', Courier, monospace;
            background-color: #060911; color: #00ff66;
        }
        
        #main-container { display: flex; flex-direction: column; width: 100%; height: 100%; }

        #header {
            height: 40px; background: #0c1322; border-bottom: 2px solid #00ff66;
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        #pcc-title { font-weight: bold; font-size: 14px; letter-spacing: 2px; }

        #workspace { flex: 1; display: flex; overflow: hidden; }
        
        #simulation-zone { flex: 2; position: relative; background: #080d16; border-right: 1px solid #1a2942; }
        canvas { width: 100%; height: 100%; display: block; }

        #side-panels { flex: 1; display: flex; flex-direction: column; background: #090f1a; min-width: 400px; }
        
        #cctv-screen {
            height: 250px; background: #000; border-bottom: 2px solid #1a2942;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; color: #00ff66;
        }
        #cctv-canvas { width: 100%; height: 100%; position: absolute; top:0; left:0; pointer-events: none; }
        #cctv-overlay { position: absolute; top: 10px; left: 10px; font-size: 11px; font-weight: bold; z-index: 2; text-shadow: 1px 1px #000; }
        #manual-hud { position: absolute; bottom: 10px; width: 90%; display: flex; justify-content: space-between; font-weight: bold; background: rgba(0,0,0,0.7); padding: 5px; box-sizing: border-box; }

        #pcc-dashboard { flex: 1; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; gap: 15px; }
        #controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        select, button {
            background: #121b2d; color: #00ff66; border: 1px solid #00ff66;
            padding: 8px; font-family: inherit; font-size: 12px; font-weight: bold;
            cursor: pointer; border-radius: 4px; width: 100%;
        }
        button:hover { background: #00ff66; color: #060911; }
        .btn-alert { border-color: #ff3333; color: #ff3333; }
        .btn-alert:hover { background: #ff3333; color: #fff; }
        .btn-active { background: #00ff66 !important; color: #060911 !important; }

        #log-container {
            flex: 1; background: #04070c; border: 1px solid #1a2942;
            border-radius: 4px; padding: 10px; font-size: 11px; overflow-y: auto; color: #88a0c0;
        }
        .log-entry { margin-bottom: 4px; }
        .log-time { color: #00ff66; margin-right: 8px; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="header">
        <div id="pcc-title">🔴 PCC REM METROPOLE - SYSTÈMEDES 26 STATIONS</div>
        <div id="pcc-status">MODE: AUTOMATIQUE (ATC)</div>
    </div>

    <div id="workspace">
        <div id="simulation-zone">
            <canvas id="synoptiqueCanvas"></canvas>
        </div>

        <div id="side-panels">
            <div id="cctv-screen">
                <div id="cctv-overlay">CCTV_FEED: AUCUN CANAL</div>
                <canvas id="cctvCanvas"></canvas>
                <div id="manual-hud" style="display: none;">
                    <span id="hud-vitesse">VIT: 0 KM/H</span>
                    <span id="hud-statut">PROPULSION IDLE</span>
                </div>
            </div>

            <div id="pcc-dashboard">
                <div id="controls">
                    <div style="grid-column: span 2;">
                        <label for="rame-select">SÉLECTION UNITÉ TRACE :</label>
                        <select id="rame-select" onchange="changerSelectionRame()"></select>
                    </div>
                    <button class="control-btn btn-alert" onclick="arretUrgence()">ARRÊT D'URGENCE</button>
                    <button id="btn-manual" class="control-btn" onclick="basculerModeManuel()">MODE MANUEL (VUE)</button>
                    <button class="control-btn" onclick="modeMeteo()">MODE TEMPÊTE</button>
                    <button class="control-btn" onclick="relancerRame()">RÉARMER LA RAME</button>
                </div>
                <div style="font-size: 11px; color:#88a0c0; text-align:center;">
                    💡 Cliquez sur une station pour ouvrir sa caméra et injecter des voyageurs (+ Renforts).
                </div>
                <div id="log-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('synoptiqueCanvas');
    const ctx = canvas.getContext('2d');
    const cctvCanvas = document.getElementById('cctvCanvas');
    const cctvCtx = cctvCanvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        cctvCanvas.width = cctvCanvas.parentElement.clientWidth;
        cctvCanvas.height = cctvCanvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    // --- LE TRONC COMMUN ET LES SÉPARATIONS PRÉCISES (26 STATIONS) ---
    const troncCommunA1A2A3A4 = [
        { name: "Gare Centrale", x: 700, y: 450, passagers: 15 },
        { name: "McGill", x: 680, y: 400, passagers: 20 },
        { name: "Édouard-Montpetit", x: 650, y: 350, passagers: 25 },
        { name: "Canora", x: 620, y: 300, passagers: 12 },
        { name: "Ville-de-Mont-Royal", x: 590, y: 280, passagers: 8 },
        { name: "Côte-de-Liesse", x: 560, y: 260, passagers: 6 },
        { name: "Montpellier", x: 530, y: 240, passagers: 5 },
        { name: "Du Ruisseau", x: 500, y: 220, passagers: 10 },
        { name: "Bois-Franc", x: 460, y: 220, passagers: 14 }
    ];

    const lignesGraphiques = {
        "A1": [
            { name: "Brossard", x: 920, y: 580, passagers: 10 },
            { name: "Du Quartier", x: 880, y: 540, passagers: 12 },
            { name: "Panama", x: 830, y: 510, passagers: 18 },
            { name: "Île-des-Sœurs", x: 770, y: 480, passagers: 15 },
            { name: "Griffintown-Bernard-Landry", x: 730, y: 465, passagers: 5 },
            ...troncCommunA1A2A3A4
        ],
        "A4": [
            ...troncCommunA1A2A3A4,
            { name: "Sunnybrooke", x: 380, y: 220, passagers: 9 },
            { name: "Pierrefonds-Roxboro", x: 320, y: 190, passagers: 11 },
            { name: "Île-Bigras", x: 270, y: 150, passagers: 4 },
            { name: "Sainte-Dorothée", x: 250, y: 120, passagers: 8 },
            { name: "Grand-Moulin", x: 220, y: 80, passagers: 6 },
            { name: "Deux-Montagnes", x: 180, y: 50, passagers: 20 }
        ],
        "A3": [
            ...troncCommunA1A2A3A4,
            { name: "Sunnybrooke", x: 380, y: 220, passagers: 9 }, // Jalon de bifurcation
            { name: "Des Sources", x: 340, y: 250, passagers: 7 },
            { name: "Fairview-Pointe-Claire", x: 260, y: 250, passagers: 22 },
            { name: "Kirkland", x: 160, y: 250, passagers: 13 },
            { name: "Anse-à-l'Orme", x: 80, y: 250, passagers: 15 }
        ],
        "A2": [
            ...troncCommunA1A2A3A4,
            { name: "Marie-Curie", x: 420, y: 280, passagers: 5 },
            { name: "YUL-Aéroport-Montréal-Trudeau", x: 380, y: 350, passagers: 40 }
        ]
    };

    // Ajustement de l'ordre pour les lignes qui partent de la Gare Centrale vers leur terminus propre
    lignesGraphiques["A1"].reverse(); // Pour que Brossard soit le terminus opposé

    // --- ENSEMBLE DES RAMES ---
    let rames = [];
    const antennes = ["A1", "A2", "A3", "A4"];
    antennes.forEach(ant => {
        for(let i = 1; i <= 3; i++) {
            rames.push({
                id: `REM-${ant}-${100 + i * 22}`,
                ligne: ant,
                etape: Math.floor(Math.random() * (lignesGraphiques[ant].length - 1)),
                prog: Math.random() * 0.9,
                sens: 1,
                vitesse: 0.003 + Math.random() * 0.002,
                maxVit: 0.005,
                enStation: false,
                timerArret: 0,
                urg: false,
                renfort: false
            });
        }
    });

    let rameSelectionnee = rames[0];
    let stationSelectionnee = lignesGraphiques["A1"][5]; // Gare Centrale par défaut
    let modeManuelActif = false;
    let vitesseManuelle = 0;

    const select = document.getElementById('rame-select');
    rames.forEach(r => {
        let opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = `${r.id} [Antenne ${r.ligne}]`;
        select.appendChild(opt);
    });

    canvas.addEventListener('click', function(e) {
        const rect = canvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;
        const scaleX = canvas.width / 1100;
        const scaleY = canvas.height / 600;

        Object.keys(lignesGraphiques).forEach(key => {
            lignesGraphiques[key].forEach(st => {
                let stX = st.x * scaleX;
                let stY = st.y * scaleY;
                let dist = Math.sqrt((clickX - stX)**2 + (clickY - stY)**2);
                
                if (dist < 12) {
                    stationSelectionnee = st;
                    modeManuelActif = false;
                    document.getElementById('manual-hud').style.display = "none";
                    
                    st.passagers += Math.floor(Math.random() * 30 + 20);
                    ajouterLog(`📢 INFLUX : Flux élevé à la station ${st.name} (${st.passagers} voyageurs).`);
                    
                    declencherRenfortGareCentrale(key, st.name);
                }
            });
        });
    });

    function declencherRenfortGareCentrale(antenneCode, nomStation) {
        let idxGare = lignesGraphiques[antenneCode].findIndex(s => s.name === "Gare Centrale");
        let rameRenfort = rames.find(r => r.ligne === antenneCode && r.etape === idxGare && !r.renfort);
        if(rameRenfort) {
            rameRenfort.renfort = true;
            rameRenfort.vitesse = rameRenfort.maxVit * 1.4;
            ajouterLog(`🚀 PCC : Unité de réserve ${rameRenfort.id} injectée en mode EXPRESS vers ${nomStation}.`);
        }
    }

    function changerSelectionRame() {
        rameSelectionnee = rames.find(r => r.id === select.value);
        if(modeManuelActif) vitesseManuelle = 0;
    }

    function basculerModeManuel() {
        modeManuelActif = !modeManuelActif;
        const btn = document.getElementById('btn-manual');
        const hud = document.getElementById('manual-hud');
        if(modeManuelActif) {
            btn.classList.add('btn-active');
            hud.style.display = "flex";
            vitesseManuelle = 0;
            rameSelectionnee.urg = false;
            stationSelectionnee = null;
            ajouterLog(`🕹️ PILOTAGE : Prise de contrôle manuelle de l'unité ${rameSelectionnee.id}.`);
        } else {
            btn.classList.remove('btn-active');
            hud.style.display = "none";
            ajouterLog(`✅ PCC : Rame ${rameSelectionnee.id} basculée en pilotage automatique.`);
        }
    }

    window.addEventListener('keydown', function(e) {
        if(!modeManuelActif) return;
        if(e.key === "ArrowUp" || e.key.toLowerCase() === "d") {
            vitesseManuelle = Math.min(vitesseManuelle + 5, 100);
        }
        if(e.key === "ArrowDown" || e.key.toLowerCase() === "s") {
            vitesseManuelle = Math.max(vitesseManuelle - 8, 0);
        }
    });

    function bouclePrincipale() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const scaleX = canvas.width / 1100;
        const scaleY = canvas.height / 600;

        // 1. Rendu des lignes (Voies ferrées)
        Object.keys(lignesGraphiques).forEach(key => {
            const stations = lignesGraphiques[key];
            ctx.beginPath();
            ctx.strokeStyle = "#121b2d"; ctx.lineWidth = 3;
            for(let i=0; i<stations.length; i++) {
                if(i===0) ctx.moveTo(stations[i].x * scaleX, stations[i].y * scaleY);
                else ctx.lineTo(stations[i].x * scaleX, stations[i].y * scaleY);
            }
            ctx.stroke();

            // Rendu des marqueurs de stations
            stations.forEach(st => {
                ctx.beginPath();
                ctx.arc(st.x * scaleX, st.y * scaleY, 5, 0, 2 * Math.PI);
                ctx.fillStyle = (stationSelectionnee === st) ? "#00ff66" : "#0c1322";
                ctx.fill();
                ctx.strokeStyle = st.passagers > 35 ? "#ff3333" : "#00ff66";
                ctx.lineWidth = 1.5; ctx.stroke();

                ctx.fillStyle = "#88a0c0"; ctx.font = "9px Courier New";
                // Éviter les superpositions grossières d'étiquettes sur le tronc commun
                if (key === "A1" || !troncCommunA1A2A3A4.some(t => t.name === st.name)) {
                    ctx.fillText(`${st.name.substring(0,15)} (${st.passagers}p)`, (st.x * scaleX) + 10, (st.y * scaleY) + 3);
                }
            });
        });

        // 2. Mise à jour de la flotte
        rames.forEach(r => {
            const stations = lignesGraphiques[r.ligne];

            if(modeManuelActif && r === rameSelectionnee) {
                r.prog += (vitesseManuelle / 25000);
                document.getElementById('hud-vitesse').textContent = `VIT: ${vitesseManuelle} KM/H`;
                document.getElementById('hud-statut').textContent = vitesseManuelle > 0 ? "TRACTION MANUELLE" : "BLOC STATIQUE";
                
                if (r.prog >= 1.0) {
                    r.prog = 0; r.etape += r.sens;
                    if (r.etape >= stations.length - 1 || r.etape <= 0) r.sens *= -1;
                    vitesseManuelle = 0;
                    ajouterLog(`🕹️ ${r.id} : Point d'arrêt franchi.`);
                }
            } else {
                if (!r.urg && !r.enStation) {
                    r.prog += r.vitesse;
                    if (r.prog >= 1.0) {
                        r.prog = 0; r.etape += r.sens;

                        if (r.etape >= stations.length - 1 || r.etape <= 0) {
                            r.sens *= -1;
                            r.renfort = false;
                            r.vitesse = r.maxVit;
                        }
                        r.enStation = true;
                    }
                } else if (r.enStation) {
                    r.timerArret += 0.016;
                    if (r.timerArret >= 2.0) {
                        r.enStation = false; r.timerArret = 0;
                        let stActuelle = stations[r.etape];
                        if(stActuelle) {
                            let embarques = Math.min(stActuelle.passagers, 25);
                            stActuelle.passagers -= embarques;
                        }
                    }
                }
            }

            let ptA = stations[r.etape];
            let ptB = stations[r.etape + (r.sens > 0 ? 1 : -1)];
            
            if (ptA && ptB) {
                let currX = (ptA.x + (ptB.x - ptA.x) * r.prog) * scaleX;
                let currY = (ptA.y + (ptB.y - ptA.y) * r.prog) * scaleY;

                ctx.beginPath();
                ctx.arc(currX, currY, r === rameSelectionnee ? 7 : 4, 0, 2 * Math.PI);
                
                if (r.urg) ctx.fillStyle = (Math.floor(Date.now() / 200) % 2 === 0) ? "#ff3333" : "#060911";
                else if (r.renfort) ctx.fillStyle = "#ffff00";
                else ctx.fillStyle = r.enStation ? "#ffffff" : "#00ff66";
                
                ctx.fill();
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.stroke();
            }
        });

        renderÉcranSecondaire();
        requestAnimationFrame(bouclePrincipale);
    }

    function renderÉcranSecondaire() {
        cctvCtx.clearRect(0, 0, cctvCanvas.width, cctvCanvas.height);
        cctvCtx.fillStyle = "rgba(0, 12, 4, 0.95)";
        cctvCtx.fillRect(0, 0, cctvCanvas.width, cctvCanvas.height);

        if (modeManuelActif && rameSelectionnee) {
            document.getElementById('cctv-overlay').textContent = `VUE_CABINE_NUMÉRIQUE // ID: ${rameSelectionnee.id}`;
            
            cctvCtx.strokeStyle = "#00ff66"; cctvCtx.lineWidth = 2;
            cctvCtx.beginPath();
            cctvCtx.moveTo(20, 20); cctvCtx.lineTo(cctvCanvas.width - 20, 20);
            cctvCtx.lineTo(cctvCanvas.width - 40, cctvCanvas.height - 40);
            cctvCtx.lineTo(40, cctvCanvas.height - 40); cctvCtx.closePath();
            cctvCtx.stroke();

            cctvCtx.beginPath();
            cctvCtx.moveTo(cctvCanvas.width / 2 - 15, 30); cctvCtx.lineTo(80, cctvCanvas.height - 40);
            cctvCtx.moveTo(cctvCanvas.width / 2 + 15, 30); cctvCtx.lineTo(cctvCanvas.width - 80, cctvCanvas.height - 40);
            cctvCtx.stroke();

            cctvCtx.fillStyle = "#00ff66"; cctvCtx.font = "11px Courier New";
            cctvCtx.fillText("▲ MAINTENIR [D] OU [HAUT] POUR AVANCER", 40, cctvCanvas.height - 55);
            
        } else if (stationSelectionnee) {
            document.getElementById('cctv-overlay').textContent = `SURVEILLANCE_QUAI // STATION: ${stationSelectionnee.name.toUpperCase()}`;
            
            cctvCtx.strokeStyle = "#00ff66"; cctvCtx.lineWidth = 1;
            cctvCtx.strokeRect(20, 50, cctvCanvas.width - 40, 140);
            
            cctvCtx.fillStyle = "rgba(0, 255, 102, 0.35)";
            let affichagePassagers = Math.min(stationSelectionnee.passagers, 150);
            for(let i=0; i < affichagePassagers; i++) {
                let px = 30 + (i * 6) % (cctvCanvas.width - 60);
                let py = 90 + Math.floor(i / 40) * 10;
                cctvCtx.fillRect(px, py, 3, 5);
            }

            cctvCtx.fillStyle = "#fff"; cctvCtx.font = "11px Courier New";
            cctvCtx.fillText(`USAGERS SUR LE QUAI : ${stationSelectionnee.passagers}`, 35, 70);
        }

        for (let y = 0; y < cctvCanvas.height; y += 4) {
            cctvCtx.fillRect(0, y, cctvCanvas.width, 1);
        }
    }

    function ajouterLog(texte) {
        const container = document.getElementById('log-container');
        const temps = new Date().toLocaleTimeString();
        container.innerHTML += `<div class="log-entry"><span class="log-time">[${temps}]</span>${texte}</div>`;
        container.scrollTop = container.scrollHeight;
    }

    function arretUrgence() {
        if(rameSelectionnee) {
            rameSelectionnee.urg = true;
            vitesseManuelle = 0;
            ajouterLog(`🚨 ALERT : Arrêt de sécurité appliqué sur ${rameSelectionnee.id}.`);
        }
    }

    function modeMeteo() {
        rames.forEach(r => { r.vitesse = r.maxVit * 0.4; });
        ajouterLog(`❄️ CONFIG : Mode Tempête activé. Limitation stricte de vitesse sur le réseau.`);
    }

    function relancerRame() {
        if(rameSelectionnee) {
            rameSelectionnee.urg = false;
            rameSelectionnee.enStation = false;
            rameSelectionnee.vitesse = rames.find(r => r.id === rameSelectionnee.id).maxVit;
            ajouterLog(`✅ PCC : Système automatisé réarmé pour ${rameSelectionnee.id}.`);
        }
    }

    resizeCanvas();
    ajouterLog("Poste de contrôle en ligne. Gestion synoptique des 26 stations activée.");
    requestAnimationFrame(bouclePrincipale);
</script>

</body>
</html>
