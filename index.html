<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCC REM Montréal - Synoptique du Réseau</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Courier New', Courier, monospace;
            background-color: #060911; color: #00ff66;
        }
        
        /* Interface Globale */
        #main-container {
            display: flex; flex-direction: column; width: 100%; height: 100%;
        }

        #header {
            height: 40px; background: #0c1322; border-bottom: 2px solid #00ff66;
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }

        #pcc-title { font-weight: bold; font-size: 16px; letter-spacing: 2px; }

        /* Zone de dessin des voies (Canvas) */
        #simulation-zone {
            flex: 1; position: relative; background: #080d16;
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* Panneau de contrôle inférieur et Logs */
        #pcc-dashboard {
            height: 220px; background: #0c1322; border-top: 2px solid #00ff66;
            display: flex; padding: 15px; box-sizing: border-box; gap: 20px;
        }

        #controls {
            width: 350px; display: flex; flex-direction: column; gap: 10px;
        }

        select, button {
            background: #121b2d; color: #00ff66; border: 1px solid #00ff66;
            padding: 10px; font-family: inherit; font-size: 14px; font-weight: bold;
            cursor: pointer; border-radius: 4px; box-sizing: border-box;
        }

        button:hover { background: #00ff66; color: #060911; }
        .btn-alert { border-color: #ff3333; color: #ff3333; }
        .btn-alert:hover { background: #ff3333; color: #fff; }

        #log-container {
            flex: 1; background: #04070c; border: 1px solid #1a2942;
            border-radius: 4px; padding: 10px; font-size: 12px;
            overflow-y: auto; color: #88a0c0;
        }
        .log-entry { margin-bottom: 5px; line-height: 1.4; }
        .log-time { color: #00ff66; margin-right: 10px; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="header">
        <div id="pcc-title">🔴 PCC REM - SURVEILLANCE SYNOPTIQUE DU RÉSEAU</div>
        <div id="pcc-status">MODE: AUTOMATIQUE (ATC)</div>
    </div>

    <div id="simulation-zone">
        <canvas id="synoptiqueCanvas"></canvas>
    </div>

    <div id="pcc-dashboard">
        <div id="controls">
            <label for="rame-select">SÉLECTION COMMANDE RAME :</label>
            <select id="rame-select"></select>
            <button class="control-btn btn-alert" onclick="arretUrgence()">INTERRUPTEUR URGENCE RAME</button>
            <button class="control-btn" onclick="modeMeteo()">MODE TEMPÊTE (RALENTIR LE RÉSEAU)</button>
            <button class="control-btn" onclick="relancerRame()">FORCER LE RÉARMEMENT DU BLOC</button>
        </div>

        <div id="log-container"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('synoptiqueCanvas');
    const ctx = canvas.getContext('2d');

    // Ajustement de la résolution du canvas
    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    // --- COORDONNÉES ET TRACÉS SIMULÉS DU RÉSEAU (Générés par code à l'écran) ---
    // Représentation graphique schématique (X de 0 à 1000, Y de 0 à 500)
    const lignesGraphiques = {
        "A1_Rive_Sud": [
            { name: "Gare Centrale", x: 150, y: 250 },
            { name: "Île-des-Sœurs", x: 350, y: 250 },
            { name: "Du Quartier", x: 650, y: 150 },
            { name: "Brossard", x: 900, y: 150 }
        ],
        "A2_Aeroport": [
            { name: "Gare Centrale", x: 150, y: 250 },
            { name: "Édouard-Montpetit", x: 350, y: 350 },
            { name: "Des Sources", x: 650, y: 450 },
            { name: "YUL-Aéroport", x: 900, y: 450 }
        ],
        "A3_Anse_Al_Orme": [
            { name: "Gare Centrale", x: 150, y: 250 },
            { name: "Sunnybrooke", x: 350, y: 200 },
            { name: "Kirkland", x: 650, y: 80 },
            { name: "Anse-à-l'Orme", x: 900, y: 80 }
        ],
        "A4_Deux_Montagnes": [
            { name: "Gare Centrale", x: 150, y: 250 },
            { name: "Canora", x: 350, y: 300 },
            { name: "Du Ruisseau", x: 650, y: 380 },
            { name: "Deux-Montagnes", x: 900, y: 380 }
        ]
    };

    // --- INSTANCIATION DES RAMES ET DE LEUR CONFIGURATION ---
    let rames = [
        { id: "REM-A1-402", ligne: "A1_Rive_Sud", etape: 0, prog: 0, sens: 1, vitesse: 0.005, maxVit: 0.005, enStation: false, timerArret: 0, urgence: false },
        { id: "REM-A2-118", ligne: "A2_Aeroport", etape: 0, prog: 0, sens: 1, vitesse: 0.004, maxVit: 0.004, enStation: false, timerArret: 0, urgence: false },
        { id: "REM-A3-305", ligne: "A3_Anse_Al_Orme", etape: 0, prog: 0, sens: 1, vitesse: 0.006, maxVit: 0.006, enStation: false, timerArret: 0, urgence: false },
        { id: "REM-A4-221", ligne: "A4_Deux_Montagnes", etape: 0, prog: 0, sens: 1, vitesse: 0.005, maxVit: 0.005, enStation: false, timerArret: 0, urgence: false }
    ];

    // Remplir la liste déroulante UI au démarrage
    const select = document.getElementById('rame-select');
    rames.forEach(r => {
        let opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = `${r.id} (${r.ligne.split('_')[0]})`;
        select.appendChild(opt);
    });

    // --- BOUCLE TECHNIQUE D'ANIMATION ET DE LOGIQUE ---
    function updateEtRender() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Facteurs d'échelle dynamiques basés sur la taille de l'écran du joueur
        const scaleX = canvas.width / 1100;
        const scaleY = canvas.height / 600;

        // 1. DESSIN DES LIGNES ET DES STATIONS (Le Synoptique Électronique)
        Object.keys(lignesGraphiques).forEach(key => {
            const stations = lignesGraphiques[key];
            
            // Tracer les rails de sécurité en bleu/gris cyber
            ctx.beginPath();
            ctx.strokeStyle = "#1a2a47";
            ctx.lineWidth = 4;
            for(let i=0; i<stations.length; i++) {
                if(i===0) ctx.moveTo(stations[i].x * scaleX, stations[i].y * scaleY);
                else ctx.lineTo(stations[i].x * scaleX, stations[i].y * scaleY);
            }
            ctx.stroke();

            // Dessiner les stations (Noeuds de contrôle)
            stations.forEach(st => {
                ctx.beginPath();
                ctx.arc(st.x * scaleX, st.y * scaleY, 6, 0, 2 * Math.PI);
                ctx.fillStyle = "#0c1322";
                ctx.fill();
                ctx.strokeStyle = "#00ff66";
                ctx.lineWidth = 2;
                ctx.stroke();

                // Étiquettes de texte des stations du REM
                ctx.fillStyle = "#88a0c0";
                ctx.font = "11px Courier New";
                ctx.fillText(st.name, (st.x * scaleX) - 40, (st.y * scaleY) - 15);
            });
        });

        // 2. MISE À JOUR ET DESSIN DES RAMES (Les blocs roulants)
        rames.forEach(r => {
            const stations = lignesGraphiques[r.ligne];
            
            if (!r.urgence && !r.enStation) {
                r.prog += r.vitesse;
                if (r.prog >= 1.0) {
                    r.prog = 0;
                    r.etape += r.sens;

                    // Arrivée en bout de ligne (Terminus)
                    if (r.etape >= stations.length - 1 || r.etape <= 0) {
                        r.sens *= -1; // Inversion du sens de marche
                        ajouterLog(`${r.id} : Terminus atteint. Inversion du vecteur de marche.`);
                    }
                    r.enStation = true;
                    ajouterLog(`${r.id} : Entrée en station automatique. Alignement des portes.`);
                }
            } else if (r.enStation) {
                r.timerArret += 0.016; // Environ 60 FPS
                if (r.timerArret >= 3.0) { // Temps de stationnement : 3 secondes
                    r.enStation = false;
                    r.timerArret = 0;
                    ajouterLog(`${r.id} : Libération des voies. Signal de départ vert.`);
                }
            }

            // Calcul du point de rendu sur la spline
            let ptA = stations[r.etape];
            let ptB = stations[r.etape + (r.sens > 0 ? 1 : -1)];
            
            if (ptA && ptB) {
                let currentX = (ptA.x + (ptB.x - ptA.x) * r.prog) * scaleX;
                let currentY = (ptA.y + (ptB.y - ptA.y) * r.prog) * scaleY;

                // Affichage visuel du train (Bloc dynamique)
                ctx.beginPath();
                ctx.arc(currentX, currentY, 8, 0, 2 * Math.PI);
                
                // Si la rame est arrêtée d'urgence par le joueur : elle clignote en rouge
                if (r.urgence) {
                    ctx.fillStyle = (Math.floor(Date.now() / 250) % 2 === 0) ? "#ff3333" : "#060911";
                } else if (r.enStation) {
                    ctx.fillStyle = "#ffffff"; // Blanc en station (portes ouvertes)
                } else {
                    ctx.fillStyle = "#00ff66"; // Vert en mouvement normal
                }
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 1;
                ctx.stroke();

                // Code identifiant écrit juste au-dessus du bloc
                ctx.fillStyle = "#fff";
                ctx.font = "bold 10px Courier New";
                ctx.fillText(r.id, currentX - 25, currentY + 20);
            }
        });

        requestAnimationFrame(updateEtRender);
    }

    // --- LOGIQUE DE COMMANDE DU POSTE DE CONTRÔLE ---
    function ajouterLog(texte) {
        const container = document.getElementById('log-container');
        const temps = new Date().toLocaleTimeString();
        container.innerHTML += `<div class="log-entry"><span class="log-time">[${temps}]</span>${texte}</div>`;
        container.scrollTop = container.scrollHeight;
    }

    function getSelectedRame() {
        let id = select.value;
        return rames.find(r => r.id === id);
    }

    function arretUrgence() {
        let r = getSelectedRame();
        if(r) {
            r.urgence = true;
            ajouterLog(`⚠️ ALERTE : Section de bloc verrouillée. Arrêt d'urgence appliqué sur ${r.id}.`);
        }
    }

    function modeMeteo() {
        rames.forEach(r => { r.vitesse = r.maxVit * 0.4; });
        ajouterLog(`❄️ CONFIG : Mode dégradation météo actif. Vitesse max bridée sur l'ensemble des antennes.`);
    }

    function relancerRame() {
        let r = getSelectedRame();
        if(r) {
            r.urgence = false;
            r.enStation = false;
            r.vitesse = r.maxVit;
            ajouterLog(`✅ PCC : Réarmement des automatismes pour ${r.id}. Reprise du profil ATC normal.`);
        }
    }

    // Lancement du système
    resizeCanvas();
    ajouterLog("Connexion aux serveurs de signalisation centrale opérationnelle.");
    ajouterLog("Réseau REM complet (A1, A2, A3, A4) : Synoptique en ligne.");
    requestAnimationFrame(updateEtRender);
</script>

</body>
</html>
